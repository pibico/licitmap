<div class="lm-admin-page-header">
  <h4 class="lm-admin-page-title">{{t.au.title}}</h4>
  <p class="lm-admin-page-subtitle">{{t.au.subtitle}}</p>
</div>

{{error_block}}
{{ok_block}}

<!-- Tabla de usuarios -->
<div class="card lm-card mb-4">
  <div class="card-body p-0">
    <table class="table table-sm mb-0 lm-admin-table">
      <thead>
        <tr>
          <th style="width:3rem;padding-left:1rem">#</th>
          <th>{{t.au.col_user}}</th>
          <th>{{t.au.col_email}}</th>
          <th>{{t.au.col_status}}</th>
          <th style="width:12rem"></th>
        </tr>
      </thead>
      <tbody>
        {{users_rows}}
      </tbody>
    </table>
  </div>
</div>

<script>
function lmEditEmail(id) {
  var form = document.getElementById('email-form-' + id);
  var disp = document.getElementById('email-disp-' + id);
  var open = form && form.style.display !== 'none';
  if (form) form.style.display = open ? 'none' : '';
  if (disp) disp.style.display = open ? '' : 'none';
  if (!open && form) form.querySelector('input[type=email]').focus();
}
</script>

<!-- Formulario nuevo usuario -->
<div class="card lm-card">
  <div class="card-body">
    <h6 class="mb-3 lm-admin-section-label">{{t.au.new}}</h6>
    <form method="post" action="/admin/users/nuevo" class="row g-2 align-items-end">
      <div class="col-sm-4">
        <label class="form-label form-label-sm">{{t.au.new_user}}</label>
        <input type="text" name="username" class="form-control form-control-sm" required
          autocomplete="off" autocapitalize="none" placeholder="p. ej. juan">
      </div>
      <div class="col-sm-5">
        <label class="form-label form-label-sm">{{t.au.new_email}}</label>
        <input type="email" name="email" class="form-control form-control-sm" required
          autocomplete="off" placeholder="juan@ejemplo.com">
      </div>
      <div class="col-sm-3">
        <button type="submit" class="btn btn-primary btn-sm w-100">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:0.3rem;vertical-align:-1px">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          {{t.au.new_create}}
        </button>
      </div>
    </form>
  </div>
</div>
