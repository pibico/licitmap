<div class="lm-login-wrap">
  <div class="lm-login-card">
    <div class="lm-login-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
      </svg>
      <span>LicitMap</span>
    </div>
    <h1 class="lm-login-title">Código de acceso</h1>
    <p class="lm-login-subtitle">
      Hemos enviado un código de 6 dígitos al correo de
      <strong style="color:var(--tx-primary)">{{login_username}}</strong>.
      Expira en 15 minutos.
    </p>
    {{error_block}}
    <form method="post" action="/login/codigo" class="lm-login-form">
      <input type="hidden" name="username" value="{{login_username}}">
      <div class="lm-login-field">
        <label class="lm-login-label" for="login-otp">Código</label>
        <input type="text" id="login-otp" name="codigo" class="form-control lm-login-otp"
          required autofocus autocomplete="one-time-code"
          inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
          placeholder="000000">
      </div>
      <button type="submit" class="btn btn-primary w-100 lm-login-submit">Verificar</button>
    </form>
    <p class="lm-login-back">
      <a href="/login">← Volver a introducir usuario</a>
    </p>
  </div>
</div>
