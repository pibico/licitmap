<!-- Formulario SMTP -->
<div class="card lm-card mb-3">
  <div class="card-body">
    <h6 class="mb-1 lm-admin-section-label">{{t.ac.email_title}}</h6>
    <p class="mb-3" style="font-size:0.8rem;color:var(--tx-muted)">
      {{t.ac.email_intro}}
    </p>
    <form method="post" action="/admin/config/correo" class="row g-3">
      <div class="col-sm-8">
        <label class="form-label form-label-sm">{{t.ac.email_host}}</label>
        <input type="text" name="smtp_host" class="form-control form-control-sm"
          value="{{smtp_host}}" placeholder="smtp.gmail.com" autocomplete="off">
      </div>
      <div class="col-sm-4">
        <label class="form-label form-label-sm">{{t.ac.email_port}}</label>
        <input type="number" name="smtp_port" class="form-control form-control-sm"
          value="{{smtp_port}}" min="1" max="65535">
      </div>
      <div class="col-sm-6">
        <label class="form-label form-label-sm">{{t.ac.email_user}}</label>
        <input type="text" name="smtp_user" class="form-control form-control-sm"
          value="{{smtp_user}}" placeholder="correo@dominio.com" autocomplete="off">
      </div>
      <div class="col-sm-6">
        <label class="form-label form-label-sm">
          {{t.ac.email_pass}}&nbsp;<span style="font-weight:400;color:var(--tx-faint)">{{smtp_pass_hint}}</span>
        </label>
        <input type="password" name="smtp_pass" class="form-control form-control-sm"
          autocomplete="new-password">
        <div class="form-text" style="font-size:0.71rem;color:var(--tx-faint)">
          {{t.ac.email_pass_hint}}
        </div>
      </div>
      <div class="col-sm-8">
        <label class="form-label form-label-sm">
          {{t.ac.email_from}}&nbsp;<span style="font-weight:400;color:var(--tx-faint)">({{t.g.optional}})</span>
        </label>
        <input type="email" name="smtp_from" class="form-control form-control-sm"
          value="{{smtp_from}}" placeholder="noreply@dominio.com" autocomplete="off">
        <div class="form-text" style="font-size:0.71rem;color:var(--tx-faint)">
          {{t.ac.email_from_hint}}
        </div>
      </div>
      <div class="col-12 d-flex gap-2">
        <button type="submit" class="btn btn-primary btn-sm">{{t.ac.email_save}}</button>
        <form method="post" action="/admin/config/correo/test" class="m-0">
          <button type="submit" class="btn btn-outline-secondary btn-sm">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              style="margin-right:0.3rem;vertical-align:-1px">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
            {{t.ac.email_test}}
          </button>
        </form>
      </div>
    </form>
  </div>
</div>
