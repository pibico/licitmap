{{ok_block}}
{{error_block}}

<div class="card lm-card">
  <div class="card-body">
    <h6 class="mb-1 lm-admin-section-label">Límite de exportación Excel</h6>
    <p class="mb-3" style="font-size:0.8rem;color:var(--tx-muted)">
      Número máximo de filas que se pueden exportar a Excel en una sola operación.
    </p>
    <form method="post" action="/admin/config/exportacion" class="row g-3 align-items-end">
      <div class="col-sm-5">
        <label class="form-label form-label-sm">Filas por exportación</label>
        <input type="number" name="export_limit" class="form-control form-control-sm"
          value="{{export_limit}}" min="100" max="50000" required>
        <div class="form-text" style="font-size:0.71rem;color:var(--tx-faint)">
          Entre 100 y 50.000. Recomendado: 5.000.
        </div>
      </div>
      <div class="col-sm-3">
        <button type="submit" class="btn btn-primary btn-sm w-100">Guardar</button>
      </div>
    </form>
  </div>
</div>
