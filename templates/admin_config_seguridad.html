</div>

      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>

  <a href="/admin/config/correo" class="lm-admin-config-tab">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:0.35rem;vertical-align:-2px">
      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>

{{ok_block}}
{{error_block}}

<div class="card lm-card">
  <div class="card-body">
    <h6 class="mb-1 lm-admin-section-label">Contraseña de administrador</h6>
    <p class="mb-3" style="font-size:0.8rem;color:var(--tx-muted)">
      Introduce tu contraseña actual para confirmar el cambio.
    </p>
    <form method="post" action="/admin/config/seguridad" class="row g-3">
      <div class="col-sm-4">
        <label class="form-label form-label-sm">Contraseña actual</label>
        <input type="password" name="password_actual" class="form-control form-control-sm"
          required autocomplete="current-password">
      </div>
      <div class="col-sm-4">
        <label class="form-label form-label-sm">Nueva contraseña</label>
        <input type="password" name="password_nueva" class="form-control form-control-sm"
          required autocomplete="new-password" minlength="8">
        <div class="form-text" style="font-size:0.71rem;color:var(--tx-faint)">Mínimo 8 caracteres.</div>
      </div>
      <div class="col-sm-4">
        <label class="form-label form-label-sm">Confirmar nueva</label>
        <input type="password" name="password_confirm" class="form-control form-control-sm"
          required autocomplete="new-password" minlength="8">
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-outline-secondary btn-sm">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            style="margin-right:0.3rem;vertical-align:-1px">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          Cambiar contraseña
        </button>
      </div>
    </form>
  </div>
</div>
