<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="lm-heading mb-0">Licitaciones</h4>
    <span class="lm-stat">{{total}} en base de datos</span>
</div>

<div class="lm-filters mb-3">
    <form method="get" action="/" class="row g-2" id="filtros-form">
        <div class="col-12 col-md-4">
            <input type="text" name="q" class="form-control form-control-sm" placeholder="Buscar por título, órgano o expediente..." value="{{q}}">
        </div>
        <div class="col-6 col-md-2">
            <select name="pais" class="form-select form-select-sm" id="filtro-pais">
                <option value="">Todos los territorios</option>
                {{pais_options}}
            </select>
        </div>
        <div class="col-6 col-md-2" id="filtro-ccaa-wrap">
            <select name="ccaa" class="form-select form-select-sm">
                <option value="">Todas las CCAA</option>
                {{ccaa_options}}
            </select>
        </div>
        <div class="col-6 col-md-2">
            <select name="estado" class="form-select form-select-sm">
                <option value="">Todos los estados</option>
                {{estado_options}}
            </select>
        </div>
        <div class="col-6 col-md-2">
            <input type="number" name="pmin" class="form-control form-control-sm" placeholder="Presup. mín. (€)" value="{{pmin}}" min="0" step="1">
        </div>
        <div class="col-6 col-md-2">
            <input type="number" name="pmax" class="form-control form-control-sm" placeholder="Presup. máx. (€)" value="{{pmax}}" min="0" step="1">
        </div>
        <div class="col-12 d-flex gap-2 align-items-center">
            <button type="submit" class="btn btn-primary btn-sm px-3">Filtrar</button>
            <a href="/" class="btn btn-outline-secondary btn-sm">Limpiar</a>
            <span class="ms-auto lm-stat">{{resultados}} resultado(s)</span>
        </div>
    </form>
</div>

{{paginacion}}

<div class="lm-table-wrapper mt-3">
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Expediente</th>
                    <th>Título</th>
                    <th>Órgano</th>
                    <th>Territorio</th>
                    <th class="text-end">Presupuesto</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
                {{filas}}
            </tbody>
        </table>
    </div>
</div>

<div class="mt-3">{{paginacion}}</div>
