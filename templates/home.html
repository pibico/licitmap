<form id="filtros-form" method="get" action="/">
    <input type="hidden" name="tipo"       id="h-tipo"   value="{{tipo}}">
    <input type="hidden" name="ccaa"       id="h-ccaa"   value="{{ccaa}}">
    <input type="hidden" name="estado"     id="h-estado" value="{{estado}}">
    <input type="hidden" name="prange"     id="h-prange" value="{{prange}}">
    <input type="hidden" name="pais"                     value="{{pais}}">

    <div class="lm-search-bar mb-3">
        <input type="text" name="q" class="form-control" placeholder="Buscar por título, órgano o expediente..." value="{{q}}">
        <input type="date" name="fecha_desde" class="form-control lm-search-date" value="{{fecha_desde}}" title="F. límite desde">
        <a href="/" class="btn btn-primary text-nowrap">Limpiar filtros</a>
    </div>
</form>

<div class="lm-stats-bar mb-3">
    <div class="lm-stat-card">
        <div class="lm-stat-value">{{total}}</div>
        <div class="lm-stat-label">Total licitaciones</div>
    </div>
    <div class="lm-stat-card">
        <div class="lm-stat-value">{{en_plazo}}</div>
        <div class="lm-stat-label">En plazo ahora</div>
    </div>
    <div class="lm-stat-card">
        <div class="lm-stat-value" id="resultados-count">{{resultados}}</div>
        <div class="lm-stat-label">Resultados filtrados</div>
    </div>
</div>

<div class="row g-3 align-items-start">
    <div class="col-lg-3">
        <div class="lm-sidebar">
            <div class="lm-sidebar-header">Filtros</div>

            <div class="lm-sidebar-section">
                <div class="lm-sidebar-title">Tipo de contrato</div>
                {{sidebar_tipo}}
            </div>

            <div class="lm-sidebar-section">
                <div class="lm-sidebar-title">Presupuesto</div>
                {{sidebar_prange}}
            </div>

            <div class="lm-sidebar-section">
                <div class="lm-sidebar-title">País</div>
                {{sidebar_pais}}
            </div>

            <div class="lm-sidebar-section" id="sidebar-ccaa-section">
                <div class="lm-sidebar-title">Comunidad autónoma</div>
                {{sidebar_ccaa}}
            </div>

            <div class="lm-sidebar-section">
                <div class="lm-sidebar-title">Estado</div>
                {{sidebar_estado}}
            </div>
        </div>
    </div>

    <div class="col-lg-9">
        <div id="cards-container">
            {{filas}}
        </div>
        <div class="mt-3" id="paginacion-bottom">{{paginacion}}</div>
    </div>
</div>
