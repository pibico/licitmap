<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Licitaciones</h2>
    <span class="text-muted">{{total}} en base de datos</span>
</div>

<form method="get" action="/" class="row g-2 mb-3">
    <div class="col-12 col-md-4">
        <input type="text" name="q" class="form-control" placeholder="Buscar por título, órgano o expediente..." value="{{q}}">
    </div>
    <div class="col-6 col-md-2">
        <select name="ccaa" class="form-select">
            <option value="">Todo el territorio</option>
            {{ccaa_options}}
        </select>
    </div>
    <div class="col-6 col-md-2">
        <select name="estado" class="form-select">
            <option value="">Todos los estados</option>
            {{estado_options}}
        </select>
    </div>
    <div class="col-6 col-md-2">
        <input type="number" name="pmin" class="form-control" placeholder="Presup. mín. (€)" value="{{pmin}}" min="0" step="1">
    </div>
    <div class="col-6 col-md-2">
        <input type="number" name="pmax" class="form-control" placeholder="Presup. máx. (€)" value="{{pmax}}" min="0" step="1">
    </div>
    <div class="col-12 d-flex gap-2">
        <button type="submit" class="btn btn-primary">Filtrar</button>
        <a href="/" class="btn btn-outline-secondary">Limpiar</a>
        <span class="ms-auto text-muted align-self-center small">{{resultados}} resultado(s)</span>
    </div>
</form>

<div class="table-responsive">
    <table class="table table-hover">
        <thead>
            <tr>
                <th>Expediente</th>
                <th>Título</th>
                <th>Órgano</th>
                <th>Territorio</th>
                <th class="text-end">Presupuesto</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody>
            {{filas}}
        </tbody>
    </table>
</div>

{{paginacion}}
