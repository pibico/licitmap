<div class="lm-admin-page-header">
  <h4 class="lm-admin-page-title">Configuración del sistema</h4>
  <p class="lm-admin-page-subtitle">Ajusta los parámetros globales de la aplicación</p>
</div>

{{ok_block}}
{{error_block}}

<!-- Exportación Excel -->
<div class="card lm-card mb-3">
  <div class="card-body">
    <h6 class="mb-3 lm-admin-section-label">Exportación Excel</h6>
    <form method="post" action="/admin/config/guardar" class="row g-3 align-items-end">
      <div class="col-sm-6">
        <label class="form-label form-label-sm">Límite de filas por exportación</label>
        <input type="number" name="export_limit" class="form-control form-control-sm"
          value="{{export_limit}}" min="100" max="50000" required>
        <div class="form-text" style="font-size:0.72rem;color:var(--tx-faint)">
          Entre 100 y 50.000 filas. Valor recomendado: 5.000.
        </div>
      </div>
      <div class="col-sm-3">
        <button type="submit" class="btn btn-primary btn-sm w-100">Guardar</button>
      </div>
    </form>
  </div>
</div>

<!-- Cambiar contraseña de admin -->
<div class="card lm-card">
  <div class="card-body">
    <h6 class="mb-1 lm-admin-section-label">Contraseña de administrador</h6>
    <p class="mb-3" style="font-size:0.8rem;color:var(--tx-muted)">
      Introduce tu contraseña actual y la nueva para actualizarla.
    </p>
    <form method="post" action="/admin/config/cambiar-password" class="row g-3">
      <div class="col-sm-4">
        <label class="form-label form-label-sm">Contraseña actual</label>
        <input type="password" name="password_actual" class="form-control form-control-sm"
          required autocomplete="current-password">
      </div>
      <div class="col-sm-4">
        <label class="form-label form-label-sm">Nueva contraseña</label>
        <input type="password" name="password_nueva" class="form-control form-control-sm"
          required autocomplete="new-password" minlength="8">
        <div class="form-text" style="font-size:0.72rem;color:var(--tx-faint)">Mínimo 8 caracteres.</div>
      </div>
      <div class="col-sm-4">
        <label class="form-label form-label-sm">Confirmar nueva</label>
        <input type="password" name="password_confirm" class="form-control form-control-sm"
          required autocomplete="new-password" minlength="8">
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-outline-secondary btn-sm">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            style="margin-right:0.3rem;vertical-align:-1px">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          Cambiar contraseña
        </button>
      </div>
    </form>
  </div>
</div>
