<div class="row justify-content-center">
  <div class="col-lg-6">

    <div class="d-flex align-items-center gap-3 mb-4">
      <h4 class="mb-0">Configuración</h4>
      <a href="/admin/usuarios" class="btn btn-sm btn-outline-secondary">← Usuarios</a>
    </div>

    {{ok_block}}
    {{error_block}}

    <div class="card lm-card">
      <div class="card-body">
        <h6 class="mb-3">Exportación Excel</h6>
        <form method="post" action="/admin/config/guardar" class="row g-3 align-items-end">
          <div class="col-sm-6">
            <label class="form-label form-label-sm">Límite de filas por exportación</label>
            <input type="number" name="export_limit" class="form-control form-control-sm"
              value="{{export_limit}}" min="100" max="50000" required>
            <div class="form-text" style="font-size:0.72rem;color:var(--tx-faint)">
              Entre 100 y 50.000 filas. Recomendado: 5.000.
            </div>
          </div>
          <div class="col-sm-4">
            <button type="submit" class="btn btn-primary btn-sm w-100">Guardar</button>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>
